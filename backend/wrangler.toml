name = "clothing-workshop-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"   # optional: wrangler picks it up from CLOUDFLARE_ACCOUNT_ID env var

# ── Local development ──────────────────────────────────────────────────────────
# Used by `wrangler dev` and `npm run db:migrate:local`

[[d1_databases]]
binding = "DB"
database_name = "workshop_local"
database_id = "5720c689-d4e9-4598-81f1-5a2a33b9a812"

[[kv_namespaces]]
binding = "CACHE"
id = "21e5f8f94c354e1eaca5b6a4043242d3"

[vars]
APP_ENV = "development"
CORS_ORIGIN = "http://localhost:5173"

# Secrets — set once, never committed:
#   wrangler secret put CLERK_SECRET_KEY


# ── Staging ────────────────────────────────────────────────────────────────────
# Deployed from the `develop` branch.
# One-time setup: see DEPLOYMENT.md § "Provision Cloudflare resources"

[env.staging]
name = "clothing-workshop-api-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "workshop_staging"
database_id = "69e136ac-1f90-4314-a79e-0bf445e0197d"         # replace: wrangler d1 create workshop_staging

[[env.staging.kv_namespaces]]
binding = "CACHE"
id = "daa956ba27d447ba8a03929902ba020c"                  # replace: wrangler kv namespace create workshop_kv_staging

[env.staging.vars]
APP_ENV = "staging"
CORS_ORIGIN = "https://staging.clothing-workshop-frontend.pages.dev"

# Secrets:
#   wrangler secret put CLERK_SECRET_KEY --env staging


# ── Production ─────────────────────────────────────────────────────────────────
# Deployed from the `main` branch.

[env.production]
name = "clothing-workshop-api"

[[env.production.d1_databases]]
binding = "DB"
database_name = "workshop_production"
database_id = "be0668a8-2112-452b-96e9-61bf307a1feb"      # replace: wrangler d1 create workshop_production

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "bd68e2d08e784d0b84d446799c47c568"               # replace: wrangler kv namespace create workshop_kv_production

[env.production.vars]
APP_ENV = "production"
CORS_ORIGIN = "https://latelier-moda.com"

# Secrets:
#   wrangler secret put CLERK_SECRET_KEY --env production
