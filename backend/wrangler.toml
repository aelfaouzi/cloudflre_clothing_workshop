name = "clothing-workshop-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "app_db"
database_id = "5720c689-d4e9-4598-81f1-5a2a33b9a812"

[[kv_namespaces]]
binding = "CACHE"
id = "21e5f8f94c354e1eaca5b6a4043242d3"

[vars]
ENVIRONMENT = "development"
CORS_ORIGIN = "http://localhost:5173"

# Secrets (set via wrangler secret put):
# CLERK_SECRET_KEY
