name: Deploy — Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false   # never cancel an in-flight production deploy

jobs:
  deploy:
    name: Build & deploy to production
    runs-on: ubuntu-latest
    environment: production

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # ── Backend ──────────────────────────────────────────────────────────────
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Type-check backend
        run: npm run type-check
        working-directory: backend

      - name: Apply production migrations
        run: npm run db:migrate:production
        working-directory: backend

      - name: Deploy Worker to production
        run: npm run deploy:production
        working-directory: backend

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Type-check frontend
        run: npm run type-check
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY_PRODUCTION }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_PRODUCTION }}

      - name: Deploy frontend to Pages (production)
        run: npm run deploy:production
        working-directory: frontend

      # ── Tag release ──────────────────────────────────────────────────────────
      - name: Tag release
        run: |
          TAG="release-$(date +%Y%m%d-%H%M%S)"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
